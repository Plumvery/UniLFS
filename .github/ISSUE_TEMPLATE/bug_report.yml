name: "\U0001F41B Bug report"
description: Something is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: input
    id: unity-version
    attributes:
      label: Unity version
      placeholder: "2022.3.62f3"
    validations:
      required: true
  - type: input
    id: unilfs-version
    attributes:
      label: UniLFS version
      placeholder: "v0.2.0"
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Storage provider
      options:
        - S3 compatible (Cloudflare R2 / S3 / MinIO / ...)
        - Google Drive
        - Not provider related
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include any Console errors / stack traces.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Track a 2 GB file
        2. Press Push
        3. ...
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
